<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400">
  <defs>
    <!-- Base cork grain -->
    <filter id="cork">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.08" numOctaves="6" seed="2" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="matrix" in="noise"
        values="0 0 0 0 0.72
                0 0 0 0 0.58
                0 0 0 0 0.38
                0 0 0 1 0" result="colored"/>
      <!-- Fine grain overlay -->
      <feTurbulence type="fractalNoise" baseFrequency="0.15 0.2" numOctaves="4" seed="5" stitchTiles="stitch" result="fine"/>
      <feColorMatrix type="matrix" in="fine"
        values="0 0 0 0 0.68
                0 0 0 0 0.52
                0 0 0 0 0.34
                0 0 0 0.4 0" result="finegrain"/>
      <feBlend in="colored" in2="finegrain" mode="multiply" result="blended"/>
      <!-- Speckle detail -->
      <feTurbulence type="turbulence" baseFrequency="0.5" numOctaves="2" seed="12" stitchTiles="stitch" result="speckle"/>
      <feColorMatrix type="matrix" in="speckle"
        values="0 0 0 0 0.6
                0 0 0 0 0.45
                0 0 0 0 0.3
                0 0 0 0.15 0" result="specklecolor"/>
      <feBlend in="blended" in2="specklecolor" mode="overlay"/>
    </filter>
  </defs>
  <rect width="400" height="400" filter="url(#cork)" fill="#c4956a"/>
</svg>
