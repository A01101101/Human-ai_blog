<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="150" fill="#faf8f3"/>

  <!-- Serif text with liquid effect -->
  <defs>
    <filter id="liquidBlur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.5" />
    </filter>
  </defs>

  <!-- Main text -->
  <text x="200" y="55" font-family="Georgia, serif" font-size="54" font-weight="600" text-anchor="middle" fill="#1b4332" letter-spacing="3">
    DIILULU
  </text>

  <!-- Liquid serifs (watercolor effect) -->
  <g fill="#d4a574" opacity="0.6">
    <ellipse cx="65" cy="60" rx="4" ry="8" filter="url(#liquidBlur)"/>
    <ellipse cx="240" cy="60" rx="4" ry="8" filter="url(#liquidBlur)"/>
    <ellipse cx="320" cy="60" rx="4" ry="8" filter="url(#liquidBlur)"/>
  </g>

  <!-- Tagline -->
  <text x="200" y="105" font-family="Georgia, serif" font-size="14" text-anchor="middle" fill="#1b4332" font-style="italic">
    AI blog... and other stuff
  </text>

  <!-- Baseline ink wash -->
  <ellipse cx="200" cy="118" rx="150" ry="6" fill="#d4a574" opacity="0.2" filter="url(#liquidBlur)"/>

  <!-- Color palette indicator -->
  <circle cx="50" cy="130" r="8" fill="#1b4332"/>
  <circle cx="75" cy="130" r="8" fill="#6a0572"/>
  <circle cx="100" cy="130" r="8" fill="#d4a574"/>
  <circle cx="125" cy="130" r="8" fill="#e8b4b8"/>
</svg>
