<svg viewBox="0 0 400 150" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="150" fill="#f5f5f5"/>

  <!-- Geometric brush strokes forming D -->
  <g stroke="#1a1a1a" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- D: vertical line -->
    <line x1="50" y1="25" x2="50" y2="100"/>
    <!-- D: curved top -->
    <path d="M 50 25 L 80 25 Q 90 40, 85 55 Q 80 60, 50 60"/>
    <!-- D: curved bottom -->
    <path d="M 50 60 L 80 60 Q 95 75, 85 95 Q 80 100, 50 100"/>
  </g>

  <!-- Remaining letters in geometric style -->
  <text x="200" y="65" font-family="Arial, sans-serif" font-size="56" font-weight="900" text-anchor="middle" fill="#1a1a1a" letter-spacing="4" opacity="0.7">
    IILULU
  </text>

  <!-- Tagline -->
  <text x="200" y="110" font-family="Arial, sans-serif" font-size="12" text-anchor="middle" fill="#333" font-weight="600">
    AI blog... and other stuff
  </text>

  <!-- Color palette indicator -->
  <circle cx="50" cy="130" r="8" fill="#1a1a1a"/>
  <circle cx="75" cy="130" r="8" fill="#004d4d"/>
  <circle cx="100" cy="130" r="8" fill="#b8ff00"/>
  <circle cx="125" cy="130" r="8" fill="#7c3aed"/>
</svg>
